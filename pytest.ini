[pytest]
testpaths = tests
python_files = e2e_*.py
python_functions = test_*
python_classes = Test*
addopts = -ra --strict-markers --tb=short
asyncio_mode = auto
markers =
    light: pure-python tests that don't need Qt SDK on PATH (parsers, helpers, sandbox rejection)
    full:  tests that need Qt 5.14.2 + MinGW installed (run qmake, mingw32-make, qmllint, etc.)
    requires_gt: alias for 'full' — kept for forward compat with davecotter/Qt-Creator-MCP-Plugin markers